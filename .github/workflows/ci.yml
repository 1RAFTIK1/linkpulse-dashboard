name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# go.mod содержит replace на ../linkpulse-contracts — CI чекаутит contracts
# в соседнюю папку (уходит после публикации contracts с git-тегом).
jobs:
  go:
    name: go lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: linkpulse-dashboard
      - uses: actions/checkout@v5
        with:
          repository: 1RAFTIK1/linkpulse-contracts
          path: linkpulse-contracts
      - uses: actions/setup-go@v6
        with:
          go-version-file: linkpulse-dashboard/go.mod
          cache: true
          cache-dependency-path: linkpulse-dashboard/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.4
          working-directory: linkpulse-dashboard
      - name: go test (race)
        working-directory: linkpulse-dashboard
        run: go test -race -count=1 ./...

  web:
    name: spa typecheck and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: npm ci
      - name: build (tsc + vite)
        working-directory: web
        run: npm run build

  security:
    name: security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: linkpulse-dashboard
      - uses: actions/checkout@v5
        with:
          repository: 1RAFTIK1/linkpulse-contracts
          path: linkpulse-contracts
      - uses: actions/setup-go@v6
        with:
          go-version-file: linkpulse-dashboard/go.mod
          cache: true
          cache-dependency-path: linkpulse-dashboard/go.sum
      - name: govulncheck
        working-directory: linkpulse-dashboard
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec
        working-directory: linkpulse-dashboard
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  docker:
    name: docker build & scan
    runs-on: ubuntu-latest
    needs: [go, web]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
        with:
          path: linkpulse-dashboard
      - uses: actions/checkout@v5
        with:
          repository: 1RAFTIK1/linkpulse-contracts
          path: linkpulse-contracts

      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -f linkpulse-dashboard/Dockerfile -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL

      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
